<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Евгений Буевич | Street style съемка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ОСНОВНОЙ ФОН - ТВОЕ ИЗОБРАЖЕНИЕ ИЗ ПАПКИ IMAGES */
        body {
            background-image: url('images/Fon.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            width: 100%;
            font-family: system-ui, sans-serif;
        }
        
        /* ========== МОБИЛЬНОЕ МЕНЮ ========== */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            z-index: 100;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            max-width: 300px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 99;
            transition: left 0.3s ease;
            padding: 80px 20px 30px;
            border-right: 1px solid rgba(212, 175, 55, 0.3);
            overflow-y: auto;
        }

        .mobile-menu.active {
            left: 0;
        }

        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            z-index: 98;
            display: none;
            backdrop-filter: blur(3px);
        }

        .mobile-menu-overlay.active {
            display: block;
        }

        .mobile-menu-item {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 15px;
        }

        .mobile-menu-link {
            color: #d1d5db;
            text-decoration: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .mobile-menu-link:hover,
        .mobile-menu-link.active {
            color: #D4AF37;
            padding-left: 15px;
        }

        .mobile-menu-link i {
            font-size: 1rem;
            transition: transform 0.3s ease;
        }

        .mobile-menu-link:hover i {
            transform: translateX(5px);
        }

        .mobile-submenu {
            display: none;
            margin-top: 10px;
            margin-left: 20px;
        }

        .mobile-submenu.active {
            display: block;
        }

        .mobile-submenu a {
            display: block;
            color: #9ca3af;
            text-decoration: none;
            padding: 8px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }

        .mobile-submenu a:hover {
            color: #D4AF37;
            border-left-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
        }
        
        /* СЕТКА РОВНО 3 КОЛОНКИ */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            aspect-ratio: 1/1;
        }
        
        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3);
            background: rgba(30, 30, 30, 0.9);
            z-index: 10;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0a0a;
            transition: transform 0.4s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        
        /* Для фото, которые лучше показывать целиком */
        .gallery-item.contain img {
            object-fit: contain;
            padding: 10px;
        }
        
        /* ЛАЙТБОКС */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .lightbox-close:hover {
            background: rgba(212, 175, 55, 0.8);
            transform: rotate(90deg);
        }
        
        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .lightbox-prev { left: 10px; }
        .lightbox-next { right: 10px; }
        
        .lightbox-prev:hover,
        .lightbox-next:hover {
            background: rgba(212, 175, 55, 0.8);
            transform: translateY(-50%) scale(1.1);
        }
        
        /* СТИЛИ ДЛЯ КАРТОЧКИ ПРАЙСА */
        .price-card { 
            background: rgba(20,20,20,0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; 
            overflow: hidden; 
            max-width: 800px; 
            margin: 0 auto; 
            transition: all 0.3s ease;
        }
        
        .price-card:hover {
            transform: translateY(-10px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 30px 60px rgba(212, 175, 55, 0.3);
        }
        
        .card-image-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #0a0a0a; 
            padding: 15px; 
        }
        
        .card-image { 
            max-width: 100%; 
            max-height: 200px;
            width: auto; 
            height: auto; 
            object-fit: contain; 
            border-radius: 8px; 
        }
        
        .card-content { 
            padding: 20px; 
        }
        
        .card-title { 
            font-size: 1.8rem; 
            font-weight: bold; 
            background: linear-gradient(to right, #fff, #F0E68C); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .price-tag { 
            font-size: 1.8rem; 
            color: #D4AF37; 
            margin-bottom: 10px;
        }
        
        .prepayment {
            color: #10b981;
            background: rgba(16,185,129,0.1);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: 500;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        
        .includes-list {
            list-style: none;
            padding: 0;
        }
        
        .includes-list li {
            color: #9ca3af;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        
        .includes-list li i {
            color: #D4AF37;
            font-size: 1rem;
        }
        
        .btn-order, .btn-back { 
            display: inline-block; 
            background: rgba(212, 175, 55, 0.2); 
            border: 1px solid rgba(212, 175, 55, 0.5); 
            color: #F0E68C; 
            padding: 10px 20px; 
            border-radius: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease; 
            font-weight: 500;
            font-size: 1rem;
        }
        
        .btn-order:hover, .btn-back:hover { 
            background: rgba(212, 175, 55, 0.4); 
            color: white; 
        }
        
        /* МЕНЮ */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); min-width: 200px; border-radius: 10px; top: 100%; left: 50%; transform: translateX(-50%); }
        .dropdown-content a { color: #d1d5db; padding: 10px 14px; display: block; text-decoration: none; font-size: 0.95rem; }
        .dropdown-content a:hover { background: rgba(212, 175, 55, 0.2); color: white; padding-left: 20px; }
        .dropdown:hover .dropdown-content { display: block; }
        
        /* Адаптация для мобильных */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            
            .desktop-nav {
                display: none !important;
            }
            
            nav .flex.justify-between {
                justify-content: flex-start !important;
                gap: 15px;
            }
            
            nav .px-8 {
                padding-left: 12px;
                padding-right: 12px;
                font-size: 0.85rem;
                margin-left: auto;
            }
            
            .hero-bg h1 {
                font-size: 2.5rem;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
        
        @media (min-width: 769px) {
            .mobile-menu-btn,
            .mobile-menu,
            .mobile-menu-overlay {
                display: none !important;
            }
        }
        
        @media (max-width: 480px) {
            .hero-bg h1 {
                font-size: 2rem;
            }
            
            .hero-bg p {
                font-size: 1rem;
            }
            
            nav .px-8 {
                padding-left: 8px;
                padding-right: 8px;
                font-size: 0.75rem;
            }
            
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }
        
        /* Кнопка Записаться */
        .from-amber-800.to-yellow-800 {
            background: linear-gradient(to right, #B8860B, #D4AF37) !important;
        }
        
        .hover\:from-amber-900.hover\:to-yellow-900:hover {
            background: linear-gradient(to right, #8B6910, #B8860B) !important;
        }
    </style>
</head>
